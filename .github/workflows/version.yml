name: Version Bump

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**'
      - '!**/*.py'
      - '!pyproject.toml'
      - '!ruff.toml'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"
    
    - name: Install dependencies
      run: uv sync --all-extras
    
    - name: Update version with Commitizen
      id: version
      run: |
        # Get latest commit message
        import subprocess
        result = subprocess.run(['git', 'log', '-1', '--pretty=format:%s'], capture_output=True, text=True)
        commit_message = result.stdout.strip()
        
        # Check if it's a conventional commit
        if commit_message.startswith(('feat:', 'fix:', 'docs:', 'style:', 'refactor:', 'test:', 'chore:')):
            # Use cz bump to determine version bump
            version_output = subprocess.run(['cz', 'version', '--dry-run'], capture_output=True, text=True)
            if version_output.returncode == 0:
                # Extract version from output
                import re
                version_match = re.search(r'v?(\d+\.\d+\.\d+)', version_output.stdout)
                if version_match:
                    new_version = version_match.group(1)
                    print(f"::set-output name=new-version::{new_version}")
        elif commit_message.startswith('feat:'):
            # Minor version bump for features
            current_version = subprocess.run(['cz', 'version', '--workspace-version'], capture_output=True, text=True).stdout.strip()
            major, minor, patch = map(int, current_version.split('.'))
            new_version = f"{major}.{minor + 1}.0"
            print(f"::set-output name=new-version::{new_version}")
        elif commit_message.startswith('fix:'):
            # Patch version bump for fixes
            current_version = subprocess.run(['cz', 'version', '--workspace-version'], capture_output=True, text=True).stdout.strip()
            major, minor, patch = map(int, current_version.split('.'))
            new_version = f"{major}.{minor}.{patch + 1}"
            print(f"::set-output name=new-version::{new_version}")
    
    - name: Push version changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add pyproject.toml
        git commit -m "chore: version bump to ${{ steps.version.outputs.new-version }}"
        git push
      if: steps.version.outputs.new-version
