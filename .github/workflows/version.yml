name: Version Bump

on:
  push:
    branches: [ main ]
    # Fix: paths-ignore with negation ('!') is not supported by GitHub Actions.
    # Replaced with 'paths' to only trigger on relevant file changes.
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'ruff.toml'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"

    - name: Install dependencies
      run: uv sync --all-extras

    # Fix: added 'shell: python' — the run block was Python code executing in bash
    # Fix: replaced deprecated '::set-output' with $GITHUB_OUTPUT
    # Fix: removed unreachable elif branches for 'feat:' and 'fix:' — both were already
    #      matched by the first if-block's tuple, so they could never be reached.
    #      Logic is now: try 'cz bump --dry-run' for any conventional commit; fall back
    #      to manual semver calculation only if cz returns a non-zero exit code.
    - name: Update version with Commitizen
      id: version
      shell: python
      run: |
        import subprocess
        import re
        import os

        def get_current_version():
            result = subprocess.run(
                ['cz', 'version', '--workspace-version'],
                capture_output=True, text=True
            )
            return result.stdout.strip()

        def set_output(version):
            with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                f.write(f"new-version={version}\n")

        # Get the latest commit message
        result = subprocess.run(
            ['git', 'log', '-1', '--pretty=format:%s'],
            capture_output=True, text=True
        )
        commit_message = result.stdout.strip()

        conventional_prefixes = ('feat:', 'fix:', 'docs:', 'style:', 'refactor:', 'test:', 'chore:')

        if not commit_message.startswith(conventional_prefixes):
            print("Not a conventional commit — skipping version bump.")
        else:
            # Try cz bump --dry-run first
            version_output = subprocess.run(
                ['cz', 'bump', '--dry-run'],
                capture_output=True, text=True
            )

            if version_output.returncode == 0:
                # Extract version from cz output
                version_match = re.search(r'v?(\d+\.\d+\.\d+)', version_output.stdout)
                if version_match:
                    new_version = version_match.group(1)
                    set_output(new_version)
                else:
                    print("Could not parse version from cz output.")
            else:
                # Fallback: manually calculate semver bump
                current_version = get_current_version()
                major, minor, patch = map(int, current_version.split('.'))

                if commit_message.startswith('feat:'):
                    new_version = f"{major}.{minor + 1}.0"
                elif commit_message.startswith('fix:'):
                    new_version = f"{major}.{minor}.{patch + 1}"
                else:
                    new_version = f"{major}.{minor}.{patch + 1}"

                set_output(new_version)

    - name: Push version changes
      if: steps.version.outputs.new-version
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add pyproject.toml
        git commit -m "chore: version bump to ${{ steps.version.outputs.new-version }}"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}